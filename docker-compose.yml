services:
  postgres:
    image: postgres:16
    container_name: mdp_postgres
    env_file: .env
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - marketdataplatform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdp_user -d market_data"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mdp_network

  api-service:
    build:
      context: .
      dockerfile: api_service/Dockerfile
    container_name: mdp_api
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - mdp_network

  syncer-service:
    build:
      context: .
      dockerfile: syncer_service/Dockerfile
    container_name: mdp_syncer
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - mdp_network

volumes:
  marketdataplatform_postgres_data:
    external: true

networks:
  mdp_network:
    driver: bridge