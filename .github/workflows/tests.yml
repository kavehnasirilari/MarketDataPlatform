name: Tests

on:
  workflow_dispatch:
  
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_market_data
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      SQL_ECHO: "false"
      ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -r api_service/requirements.txt
          pip install -r syncer_service/requirements.txt

      - name: Run CI-safe tests
        run: pytest tests/unit tests/integration/internal -v